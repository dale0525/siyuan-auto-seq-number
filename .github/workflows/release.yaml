name: Release Workflow

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get Current Version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check Existing Release
        id: release_check
        run: |
          release_title="v${{ steps.version.outputs.version }}"
          if gh release view "$release_title" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $release_title already exists. Skip build and publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies and Build
        if: steps.release_check.outputs.exists != 'true'
        id: build
        run: |
          npm install -g pnpm
          pnpm install
          pnpm run build
          echo "zip_path=$(pwd)/package.zip" >> "$GITHUB_OUTPUT"

      - name: Release
        if: steps.release_check.outputs.exists != 'true'
        run: |
          current_version="${{ steps.version.outputs.version }}"
          release_title="v$current_version"
          if gh release view "$release_title" >/dev/null 2>&1; then
            echo "Release $release_title already exists. Nothing to do."
            exit 0
          fi

          commit_message=$(git log -1 --pretty=%B)
          echo "Creating release $release_title"
          gh release create "$release_title" "${{ steps.build.outputs.zip_path }}" -t "$release_title" -n "$commit_message"
