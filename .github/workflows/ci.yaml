name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Pixi
      uses: prefix-dev/setup-pixi@v0.9.3
      with:
        pixi-version: v0.62.2
        cache: true

    - name: Lint
      run: pixi run pnpm run lint

    - name: Test
      run: pixi run pnpm test

    - name: Build
      run: pixi run build
